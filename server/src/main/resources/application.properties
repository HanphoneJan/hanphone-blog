dotenv.enabled=true
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:5432/blog?characterEncoding=utf-8&serverTimezone=GMT
spring.datasource.username=${PG_USERNAME}
spring.datasource.password=${PG_PASSWORD}

#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# 日志配置
# 生产环境建议使用 INFO 级别，通过环境变量或命令行参数控制
# 例如: java -jar blog.jar --spring.profiles.active=prod
logging.level.root=info
logging.level.com.example.blog=${LOG_LEVEL_APP:info}
server.port=${SERVER_PORT:8090}

server.compression.enabled=true
server.compression.mime-types=application/javascript,text/css,application/json,application/xml,text/html,text/xml,text/plain

# 邮箱服务，启用 SSL 加密，对465端口
spring.mail.host=${EMAIL_HOST:smtp.163.com}
spring.mail.protocol=smtps
spring.mail.port=465
spring.mail.from-name=${EMAIL_FROM_NAME:管理员}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}

# Redis服务器地址
spring.redis.host=${REDIS_HOST:localhost}
# Redis服务器端口
spring.redis.port=${REDIS_PORT:6379}
# Redis有密码
spring.redis.password=${REDIS_PASSWORD}

# JWT配置
TOKEN_SECRET=${TOKEN_SECRET}
JWT_ISSUER=${JWT_ISSUER}
JWT_EXPIRE_TIME=${JWT_EXPIRE_TIME:604800000}

# 内部服务通信密钥（hanphone-chat 等内部服务调用 /api/** 接口时使用）
internal.api.key=${INTERNAL_API_KEY:}

# Actuator 安全配置：仅暴露 health 端点
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health

# CORS 配置：通过环境变量设置允许的域名，多个域名用逗号分隔
# 例如: CORS_ALLOWED_ORIGINS=https://blog.example.com,https://admin.example.com

# ==================== 安全配置：防御大请求和恶意请求 ====================
# 文件上传大小限制（防止大文件上传导致 OOM）
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=10MB
spring.servlet.multipart.location=/tmp

# Tomcat 连接限制（防止连接数过多）
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.max-connections=8192
server.tomcat.accept-count=100

# 请求正文大小限制
server.max-http-request-header-size=8KB

# JSON 请求体大小限制（Spring Boot 2.7+）
spring.codec.max-in-memory-size=10MB

# 分页安全限制常量
pagination.max-page-size=100

# ==================== URL 和参数长度限制（防御超长 URL 攻击）====================
# Tomcat 请求参数限制
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB

# Spring MVC 参数绑定限制
spring.mvc.pathmatch.matching-strategy=path_pattern_parser

# ==================== 数据库连接池配置（HikariCP）====================
# 默认最大连接数仅 10，与 Tomcat 200 线程完全不匹配，并发时连接池耗尽导致全站 500
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==================== Redis 连接池配置（Lettuce）====================
spring.redis.lettuce.pool.max-active=16
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=4

# ==================== 邮件验证码限流 ====================
# 同一邮箱发送验证码的最小间隔（秒）
captcha.rate-limit-seconds=60
# 邮箱地址最大长度
captcha.max-email-length=254

# 搜索参数最大长度限制（字符数）
search.max-query-length=100
url.max-length=2048

# 密码最小长度
password.min-length=8
