name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============ Server (Java) Tests ============
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        working-directory: ./server
        run: mvn clean test --batch-mode

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: server/target/surefire-reports/

  # ============ Web (Next.js) Unit Tests ============
  web-unit-test:
    name: Web Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./web
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests
        working-directory: ./web
        run: pnpm test || true

  # ============ Build Verification ============
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [server-test, web-unit-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Server build verification
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build Server
        working-directory: ./server
        run: mvn clean package -DskipTests --batch-mode

      # Web build verification
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./web
        run: pnpm install --no-frozen-lockfile

      - name: Build Web
        working-directory: ./web
        run: pnpm build
