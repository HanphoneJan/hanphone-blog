name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============ Server (Java) Tests ============
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        working-directory: ./server
        run: mvn clean test --batch-mode

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: server-test-results
          path: server/target/surefire-reports/

  # ============ Web (Next.js) Unit Tests ============
  web-unit-test:
    name: Web Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: ./web
        run: pnpm test || true

  # ============ Build Verification ============
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [server-test, web-unit-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Server build verification
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Server
        working-directory: ./server
        run: mvn clean package -DskipTests --batch-mode

      # Web build verification
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: './pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Gomoku
        run: pnpm build:gomoku

      - name: Build Photo Wall
        run: pnpm build:photo-wall

      - name: Build Web
        working-directory: ./web
        run: pnpm build
